<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradLinker | Discord Translation Bot for Multilingual Servers</title>
  <meta name="description" content="TradLinker is a Discord translation bot for multilingual servers. Visit the English or French version to discover automatic channel translation, multilingual polls, and onboarding tools."/>
  <meta name="robots" content="noindex,follow"/>
  <meta http-equiv="refresh" content="0; url=./en/"/>
  <link rel="canonical" href="https://tradlinker.com/en/"/>
  <link rel="alternate" hreflang="en" href="https://tradlinker.com/en/"/>
  <link rel="alternate" hreflang="fr" href="https://tradlinker.com/fr/"/>
  <link rel="alternate" hreflang="x-default" href="https://tradlinker.com/en/"/>
  <script>
    (function () {
      var githubHost = 'tradowner.github.io';
      var customDomain = 'https://tradlinker.com';
      if (window.location.hostname === githubHost) {
        var path = (window.location.pathname || '/').replace(/^\/tradlinker\.com(?=\/|$)/, '') || '/';
        window.location.replace(customDomain + path + window.location.search + window.location.hash);
        return;
      }
      var target = './en/' + (window.location.hash || '');
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the English page… <a href="./en/">Continue</a></p>
  <p><a href="./en/">English version</a> · <a href="./fr/">Version française</a></p>
</body>
</html>
